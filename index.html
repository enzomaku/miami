<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Miami Trip Countdown</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            /* YOUR MIAMI ART DECO IMAGE (miami.jpg) IS NOW THE BACKGROUND */
            /* Ensure the image file is named miami.jpg and in the same folder */
            background: #000 url('miami.jpg') no-repeat center center fixed;
            background-size: cover;
        }

        .glass-panel {
            /* Adjust the final '0.7' for more/less transparency (0.0 to 1.0) */
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            padding: 2rem;
            border-radius: 20px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.4);
            text-align: center;
            width: 90%;
            max-width: 600px;
            border: 1px solid rgba(255, 255, 255, 0.3);
        }

        h1 { 
            color: #FF1493; /* Neon Pink */
            font-size: 2.2rem; 
            margin-bottom: 0.5rem; 
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        .subtitle { 
            color: #222; 
            font-weight: 600; 
            margin-bottom: 2rem; 
        }

        .countdown-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
        }

        .time-segment {
            background: rgba(255, 255, 255, 0.3);
            padding: 15px 5px;
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .number {
            display: block;
            font-size: 2rem;
            font-weight: 800;
            color: #008080; /* Tropical Teal */
        }

        .label {
            font-size: 0.7rem;
            text-transform: uppercase;
            color: #333;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <div class="glass-panel">
        <h1>☀️ MIAMI 2026</h1>
        <p class="subtitle">Family Arrival: June 26 @ 3:00 PM</p>
        
        <div class="countdown-grid">
            <div class="time-segment"><span class="number" id="days">00</span><span class="label">Days</span></div>
            <div class="time-segment"><span class="number" id="hours">00</span><span class="label">Hours</span></div>
            <div class="time-segment"><span class="number" id="minutes">00</span><span class="label">Min</span></div>
            <div class="time-segment"><span class="number" id="seconds">00</span><span class="label">Sec</span></div>
        </div>
    </div>

    <script>
        const targetDate = new Date("June 26, 2026 15:00:00").getTime();

        function update() {
            const now = new Date().getTime();
            const gap = targetDate - now;

            const second = 1000;
            const minute = second * 60;
            const hour = minute * 60;
            const day = hour * 24;

            document.getElementById("days").innerText = Math.floor(gap / day);
            document.getElementById("hours").innerText = Math.floor((gap % day) / hour);
            document.getElementById("minutes").innerText = Math.floor((gap % hour) / minute);
            document.getElementById("seconds").innerText = Math.floor((gap % minute) / second);
        }

        setInterval(update, 1000);
        update();
    </script>
</body>
</html>
